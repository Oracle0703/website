name: website-ci

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.0"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Audit production dependencies
        run: npm run audit:production

      - name: Lint Next workspaces
        run: |
          npm run lint -w apps/website
          npm run lint -w apps/ai-page-analysis
          npm run lint -w apps/dashboard-web

      - name: Build Next workspaces
        run: |
          npm run build:website
          npm run build -w apps/ai-page-analysis
          npm run build:dashboard-web
