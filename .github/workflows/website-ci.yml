name: website-ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: website-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SITE_URL: https://www.meaningful.ink

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm run audit:production

      - name: Run tests
        run: npm test

      - name: Lint Next workspaces
        run: |
          npm run lint -w apps/website
          npm run lint -w apps/ai-page-analysis
          npm run lint -w apps/dashboard-web

      - name: Validate website content
        run: npm run validate:website-content

      - name: Build website
        run: npm run build:website

      - name: Build supporting Next workspaces
        run: |
          npm run build -w apps/ai-page-analysis
          npm run build:dashboard-web

      - name: Verify static entrypoints and metadata
        run: npm run verify:website-static

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify browser interactions and accessibility
        run: npm run verify:website-browser

      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: website-browser-evidence-${{ github.run_attempt }}
          path: test-results/evidence/*.png
          if-no-files-found: warn
          retention-days: 7
          compression-level: 0
