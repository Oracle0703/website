<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="dashboard-title dashboard-desc">
  <title id="dashboard-title">Dashboard Console implemented architecture</title>
  <desc id="dashboard-desc">Privacy-safe architecture diagram of the current Dashboard Console implementation. The administrator path uses dashboard-web, login, and a JWT-protected dashboard API. A separate automation path uses an ingest token and idempotency key. The API stores state, tasks, status, daily events, and daily logs as OSS JSON objects with explicit consistency rules. Content editing, deployment records, and Knock summaries are separately marked as roadmap items that are not implemented here.</desc>
  <defs>
    <linearGradient id="dashboard-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0c0f" />
      <stop offset="0.5" stop-color="#17171c" />
      <stop offset="1" stop-color="#15120f" />
    </linearGradient>
    <linearGradient id="dashboard-card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171f21" />
      <stop offset="1" stop-color="#19191e" />
    </linearGradient>
    <pattern id="dashboard-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#5fd4d0" stroke-opacity="0.05" />
    </pattern>
    <marker id="dashboard-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#e7a75b" />
    </marker>
    <style>
      .title { font: 700 46px ui-sans-serif, system-ui, sans-serif; fill: #f5f2eb; letter-spacing: -1.5px; }
      .subtitle { font: 400 20px ui-sans-serif, system-ui, sans-serif; fill: #d8d0c6; }
      .badge { font: 700 13px ui-sans-serif, system-ui, sans-serif; fill: #0c0c0f; letter-spacing: 1.8px; }
      .lane { font: 700 13px ui-sans-serif, system-ui, sans-serif; fill: #5fd4d0; letter-spacing: 1.5px; }
      .node-title { font: 700 23px ui-sans-serif, system-ui, sans-serif; fill: #f5f2eb; }
      .node-copy { font: 400 16px ui-sans-serif, system-ui, sans-serif; fill: #d8d0c6; }
      .node-detail { font: 500 14px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #f5c27a; }
      .boundary-title { font: 700 15px ui-sans-serif, system-ui, sans-serif; fill: #5fd4d0; letter-spacing: 1.2px; }
      .boundary-copy { font: 500 16px ui-sans-serif, system-ui, sans-serif; fill: #f5f2eb; }
      .roadmap-title { font: 700 15px ui-sans-serif, system-ui, sans-serif; fill: #aaa39a; letter-spacing: 1.1px; }
      .roadmap-copy { font: 500 15px ui-sans-serif, system-ui, sans-serif; fill: #aaa39a; }
      .flow { fill: none; stroke: #e7a75b; stroke-width: 4; stroke-linecap: round; marker-end: url(#dashboard-arrow); }
    </style>
  </defs>

  <rect width="1600" height="900" rx="32" fill="url(#dashboard-bg)" />
  <rect width="1600" height="900" rx="32" fill="url(#dashboard-grid)" />
  <circle cx="1490" cy="50" r="300" fill="#e7a75b" opacity="0.06" />
  <circle cx="40" cy="860" r="260" fill="#5fd4d0" opacity="0.06" />

  <g transform="translate(80 72)">
    <rect x="0" y="0" width="132" height="30" rx="15" fill="#5fd4d0" />
    <text x="66" y="20" text-anchor="middle" class="badge">IMPLEMENTED</text>
    <text x="0" y="78" class="title">Dashboard Console · operations data flow</text>
    <text x="0" y="112" class="subtitle">Two authentication paths, one API boundary, and low-frequency JSON storage</text>
  </g>

  <text x="80" y="220" class="lane">ADMINISTRATOR PATH</text>
  <text x="80" y="490" class="lane">AUTOMATION PATH</text>

  <path class="flow" d="M330 300H400" />
  <path class="flow" d="M700 300H790" />
  <path class="flow" d="M330 565H400" />
  <path class="flow" d="M700 565H790" />
  <path class="flow" d="M1150 435H1230" />

  <g>
    <rect x="80" y="240" width="250" height="150" rx="20" fill="url(#dashboard-card)" stroke="#8c838b" stroke-width="2" />
    <text x="108" y="278" class="node-title">Admin browser</text>
    <text x="108" y="312" class="node-copy">Reviews and updates</text>
    <text x="108" y="342" class="node-detail">password → login</text>
  </g>

  <g>
    <rect x="400" y="240" width="300" height="150" rx="20" fill="url(#dashboard-card)" stroke="#5fd4d0" stroke-width="2" />
    <text x="428" y="278" class="node-title">dashboard-web</text>
    <text x="428" y="312" class="node-copy">Next.js operations client</text>
    <text x="428" y="342" class="node-detail">bearer JWT on API calls</text>
  </g>

  <g>
    <rect x="80" y="510" width="250" height="150" rx="20" fill="url(#dashboard-card)" stroke="#8c838b" stroke-width="2" />
    <text x="108" y="548" class="node-title">Automation</text>
    <text x="108" y="582" class="node-copy">Appends task events</text>
    <text x="108" y="612" class="node-detail">bounded event shape</text>
  </g>

  <g>
    <rect x="400" y="510" width="300" height="150" rx="20" fill="url(#dashboard-card)" stroke="#5fd4d0" stroke-width="2" />
    <text x="428" y="548" class="node-title">Ingest gate</text>
    <text x="428" y="582" class="node-copy">Separate bearer credential</text>
    <text x="428" y="612" class="node-detail">INGEST_TOKEN · idempotency key</text>
  </g>

  <g>
    <rect x="790" y="250" width="360" height="370" rx="24" fill="url(#dashboard-card)" stroke="#e7a75b" stroke-width="3" />
    <text x="822" y="292" class="lane">API BOUNDARY</text>
    <text x="822" y="338" class="node-title">dashboard-api</text>
    <text x="822" y="372" class="node-copy">Express routes for current operations data</text>
    <line x1="822" y1="402" x2="1118" y2="402" stroke="#8c838b" stroke-opacity="0.65" />
    <text x="822" y="440" class="node-detail">JWT: state · events · tasks</text>
    <text x="822" y="472" class="node-detail">JWT: logs · status</text>
    <text x="822" y="520" class="node-detail">Ingest: event append + state update</text>
    <text x="822" y="564" class="node-copy">Explicit errors for invalid input,</text>
    <text x="822" y="590" class="node-copy">authorization, and write conflicts</text>
  </g>

  <g>
    <rect x="1230" y="300" width="290" height="270" rx="24" fill="url(#dashboard-card)" stroke="#e7a75b" stroke-width="2" />
    <text x="1258" y="338" class="lane">PERSISTENCE</text>
    <text x="1258" y="380" class="node-title">OSS JSON objects</text>
    <text x="1258" y="418" class="node-copy">State · tasks · status</text>
    <text x="1258" y="450" class="node-copy">Daily events · daily logs</text>
    <line x1="1258" y1="480" x2="1490" y2="480" stroke="#8c838b" stroke-opacity="0.65" />
    <text x="1258" y="518" class="node-detail">ETag conditional writes</text>
    <text x="1258" y="545" class="node-detail">bounded append retries</text>
  </g>

  <g>
    <rect x="80" y="720" width="1050" height="108" rx="18" fill="#19191e" stroke="#5fd4d0" stroke-width="2" />
    <text x="108" y="755" class="boundary-title">IMPLEMENTED CONSISTENCY BOUNDARY</text>
    <text x="108" y="788" class="boundary-copy">Tasks: If-Match → 409 · append arrays: bounded retry · ingest events: duplicate-safe IDs</text>
  </g>

  <g>
    <rect x="1170" y="700" width="350" height="148" rx="18" fill="#141418" stroke="#777078" stroke-width="2" stroke-dasharray="10 8" />
    <text x="1198" y="735" class="roadmap-title">ROADMAP · NOT IMPLEMENTED</text>
    <text x="1198" y="770" class="roadmap-copy">Content editing</text>
    <text x="1198" y="797" class="roadmap-copy">Deployment records</text>
    <text x="1198" y="824" class="roadmap-copy">Knock summaries</text>
  </g>
</svg>
