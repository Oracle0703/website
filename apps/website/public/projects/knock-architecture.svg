<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="knock-title knock-desc">
  <title id="knock-title">Knock implemented architecture</title>
  <desc id="knock-desc">Privacy-safe architecture diagram of the current Knock implementation. An Nginx access log is read incrementally, parsed and classified, stored in local SQLite WAL, aggregated by an Express API, and displayed in a protected static dashboard. Dashboard summaries and alert signals are separately marked as roadmap items that are not implemented here.</desc>
  <defs>
    <linearGradient id="knock-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0c0f" />
      <stop offset="0.52" stop-color="#17171c" />
      <stop offset="1" stop-color="#101719" />
    </linearGradient>
    <linearGradient id="knock-card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#211b18" />
      <stop offset="1" stop-color="#17171c" />
    </linearGradient>
    <pattern id="knock-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#e7a75b" stroke-opacity="0.055" />
    </pattern>
    <marker id="knock-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5fd4d0" />
    </marker>
    <style>
      .title { font: 700 46px ui-sans-serif, system-ui, sans-serif; fill: #f5f2eb; letter-spacing: -1.5px; }
      .subtitle { font: 400 20px ui-sans-serif, system-ui, sans-serif; fill: #d8d0c6; }
      .badge { font: 700 13px ui-sans-serif, system-ui, sans-serif; fill: #0c0c0f; letter-spacing: 1.8px; }
      .step { font: 700 13px ui-sans-serif, system-ui, sans-serif; fill: #f5c27a; letter-spacing: 1.6px; }
      .node-title { font: 700 24px ui-sans-serif, system-ui, sans-serif; fill: #f5f2eb; }
      .node-copy { font: 400 16px ui-sans-serif, system-ui, sans-serif; fill: #d8d0c6; }
      .node-detail { font: 500 14px ui-monospace, SFMono-Regular, Consolas, monospace; fill: #5fd4d0; }
      .boundary-title { font: 700 15px ui-sans-serif, system-ui, sans-serif; fill: #f5c27a; letter-spacing: 1.2px; }
      .boundary-copy { font: 500 17px ui-sans-serif, system-ui, sans-serif; fill: #f5f2eb; }
      .roadmap-title { font: 700 15px ui-sans-serif, system-ui, sans-serif; fill: #aaa39a; letter-spacing: 1.1px; }
      .roadmap-copy { font: 500 16px ui-sans-serif, system-ui, sans-serif; fill: #aaa39a; }
      .flow { fill: none; stroke: #5fd4d0; stroke-width: 4; stroke-linecap: round; marker-end: url(#knock-arrow); }
    </style>
  </defs>

  <rect width="1600" height="900" rx="32" fill="url(#knock-bg)" />
  <rect width="1600" height="900" rx="32" fill="url(#knock-grid)" />
  <circle cx="1460" cy="40" r="300" fill="#5fd4d0" opacity="0.055" />
  <circle cx="70" cy="860" r="250" fill="#e7a75b" opacity="0.07" />

  <g transform="translate(80 72)">
    <rect x="0" y="0" width="132" height="30" rx="15" fill="#e7a75b" />
    <text x="66" y="20" text-anchor="middle" class="badge">IMPLEMENTED</text>
    <text x="0" y="78" class="title">Knock · access-log monitor</text>
    <text x="0" y="112" class="subtitle">Current single-machine data flow with public evidence kept privacy-safe</text>
  </g>

  <path class="flow" d="M340 300H410" />
  <path class="flow" d="M710 300H780" />
  <path class="flow" d="M930 390C930 438 740 430 630 490" />
  <path class="flow" d="M630 570H700" />
  <path class="flow" d="M1010 570H1080" />

  <g>
    <rect x="80" y="220" width="260" height="170" rx="20" fill="url(#knock-card)" stroke="#8c838b" stroke-width="2" />
    <text x="108" y="253" class="step">01 · INPUT</text>
    <text x="108" y="294" class="node-title">Nginx access log</text>
    <text x="108" y="327" class="node-copy">Configured local log file</text>
    <text x="108" y="357" class="node-detail">UTF-8 · append-only input</text>
  </g>

  <g>
    <rect x="410" y="220" width="300" height="170" rx="20" fill="url(#knock-card)" stroke="#e7a75b" stroke-width="2" />
    <text x="438" y="253" class="step">02 · INGEST</text>
    <text x="438" y="294" class="node-title">Incremental reader</text>
    <text x="438" y="327" class="node-copy">Reads only newly appended bytes</text>
    <text x="438" y="357" class="node-detail">saved offset · rotation reset</text>
  </g>

  <g>
    <rect x="780" y="220" width="300" height="170" rx="20" fill="url(#knock-card)" stroke="#e7a75b" stroke-width="2" />
    <text x="808" y="253" class="step">03 · NORMALIZE</text>
    <text x="808" y="294" class="node-title">Parse &amp; classify</text>
    <text x="808" y="327" class="node-copy">Normalizes request fields</text>
    <text x="808" y="357" class="node-detail">status · path · suspicious flag</text>
  </g>

  <g>
    <rect x="310" y="490" width="320" height="160" rx="20" fill="url(#knock-card)" stroke="#5fd4d0" stroke-width="2" />
    <text x="338" y="523" class="step">04 · STORE</text>
    <text x="338" y="564" class="node-title">SQLite WAL</text>
    <text x="338" y="597" class="node-copy">Indexed local request records</text>
    <text x="338" y="627" class="node-detail">transaction · retention cleanup</text>
  </g>

  <g>
    <rect x="700" y="490" width="310" height="160" rx="20" fill="url(#knock-card)" stroke="#5fd4d0" stroke-width="2" />
    <text x="728" y="523" class="step">05 · AGGREGATE</text>
    <text x="728" y="564" class="node-title">Express API</text>
    <text x="728" y="597" class="node-copy">Overview, trends, top lists</text>
    <text x="728" y="627" class="node-detail">1h · 24h · 7d windows</text>
  </g>

  <g>
    <rect x="1080" y="490" width="360" height="160" rx="20" fill="url(#knock-card)" stroke="#5fd4d0" stroke-width="2" />
    <text x="1108" y="523" class="step">06 · REVIEW</text>
    <text x="1108" y="564" class="node-title">Protected dashboard</text>
    <text x="1108" y="597" class="node-copy">Static UI calls same-origin API</text>
    <text x="1108" y="627" class="node-detail">Basic Auth when exposed</text>
  </g>

  <g>
    <rect x="80" y="720" width="920" height="108" rx="18" fill="#19191e" stroke="#e7a75b" stroke-width="2" />
    <text x="108" y="755" class="boundary-title">IMPLEMENTED BOUNDARY</text>
    <text x="108" y="790" class="boundary-copy">Local files · one process · one SQLite writer · no public monitoring data</text>
  </g>

  <g>
    <rect x="1040" y="720" width="480" height="108" rx="18" fill="#141418" stroke="#777078" stroke-width="2" stroke-dasharray="10 8" />
    <text x="1068" y="755" class="roadmap-title">ROADMAP · NOT IMPLEMENTED HERE</text>
    <text x="1068" y="790" class="roadmap-copy">Dashboard summaries · alert signals</text>
  </g>
</svg>
